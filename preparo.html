<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparo · Comida Japonesa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #4a4a4a; /* fundo cinza escuro */
        }

        /* MENU PRETO (igual às outras páginas) */
        header {
            background-color: black;
            padding: 15px 0;
            width: 100%;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .menu a {
            color: #999;
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            transition: color 0.2s;
        }

        .menu a:hover,
        .menu a.active {
            color: white;
        }

        /* CONTEÚDO PRINCIPAL */
        .conteudo-preparo {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 60px;
            color: white;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px black;
        }

        /* GALERIA DE IMAGENS */
        .galeria {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            max-width: 1200px;
            width: 100%;
        }

        .card-receita {
            flex: 1 1 300px;
            max-width: 400px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            transition: transform 0.3s;
            cursor: pointer;
        }

        .card-receita:hover {
            transform: scale(1.03);
        }

        .card-receita img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .card-receita h2 {
            color: white;
            font-size: 36px;
            margin-top: 15px;
            text-transform: uppercase;
            text-shadow: 2px 2px 3px black;
        }

        /* RODAPÉ PRETO */
        footer {
            background-color: black;
            color: #666;
            text-align: center;
            padding: 12px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 40px;
            }
            .card-receita h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
     <header>
        <div class="menu">
            <a href="index.html">INÍCIO</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="tradicao.html" class="active">TRADIÇÃO</a>
            <a href="preparo.html">PREPARO</a>
        </div>
    </header>

    <div class="conteudo-preparo">
        <h1>Escolha uma receita</h1>
        <div class="galeria">
            <!-- Card Temaki -->
            <div class="card-receita" onclick="window.location.href='temaki.html'">
                <img src="https://www.istockphoto.com/br/foto/comida-japonesa-temaki-gm471849787-26711055" alt="Temaki">
                <h2>TEMAKI</h2>
            </div>
            <!-- Card Lámen -->
            <div class="card-receita" onclick="window.location.href='lamen.html'">
                <img src="https://images.pexels.com/photos/884600/pexels-photo-884600.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Lámen">
                <h2>LÁMEN</h2>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 COMIDA JAPONESA</p>
    </footer>
</body>
</html>
