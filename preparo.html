<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preparo · Comida Japonesa</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Times New Roman', Times, serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #4a4a4a;
        }

        header {
            background-color: black;
            padding: 15px 0;
            width: 100%;
        }

        .menu {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }

        .menu a {
            color: #999;
            text-decoration: none;
            font-size: 16px;
            text-transform: uppercase;
            font-family: Arial, sans-serif;
            transition: color 0.2s;
        }

        .menu a:hover,
        .menu a.active {
            color: white;
        }

        .conteudo-preparo {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        h1 {
            font-size: 60px;
            color: white;
            margin-bottom: 50px;
            text-transform: uppercase;
            font-family: 'Times New Roman', Times, serif;
            letter-spacing: 2px;
            text-shadow: 2px 2px 5px black;
            text-align: center;
        }

        .galeria {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1400px;
            width: 100%;
        }

        .card-receita {
            flex: 1 1 250px;
            max-width: 280px;
            background-color: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card-receita:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            background-color: rgba(0,0,0,0.5);
        }

        .card-receita img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            pointer-events: none; /* para não interferir no clique do card */
        }

        .card-receita h2 {
            color: white;
            font-size: 24px;
            margin-top: 12px;
            text-transform: uppercase;
            text-shadow: 2px 2px 3px black;
            letter-spacing: 1px;
            pointer-events: none;
        }

        footer {
            background-color: black;
            color: #666;
            text-align: center;
            padding: 12px;
            font-size: 14px;
            font-family: Arial, sans-serif;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 40px;
            }
            .card-receita {
                max-width: 240px;
            }
            .card-receita h2 {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="menu">
            <a href="index.html">INÍCIO</a>
            <a href="historia.html">HISTÓRIA</a>
            <a href="tradicao.html">TRADIÇÃO</a>
            
            <a href="preparo.html" class="active">PREPARO</a>
        </div>
    </header>

    <div class="conteudo-preparo">
        <h1>Escolha uma receita</h1>
        <div class="galeria">
            <!-- 1. Temaki -->
            <div class="card-receita" onclick="window.location.href='temaki.html'">
                <img src="https://images.pexels.com/photos/699953/pexels-photo-699953.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Temaki">
                <h2>TEMAKI</h2>
            </div>
            <!-- 2. Lámen -->
            <div class="card-receita" onclick="window.location.href='lamen.html'">
                <img src="https://images.pexels.com/photos/884600/pexels-photo-884600.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Lámen">
                <h2>LÁMEN</h2>
            </div>
            <!-- 3. Sushi -->
            <div class="card-receita" onclick="window.location.href='sushi.html'">
                <img src="https://images.pexels.com/photos/357756/pexels-photo-357756.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Sushi">
                <h2>SUSHI</h2>
            </div>
            <!-- 4. Sashimi -->
            <div class="card-receita" onclick="window.location.href='sashimi.html'">
                <img src="https://images.pexels.com/photos/2323398/pexels-photo-2323398.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Sashimi">
                <h2>SASHIMI</h2>
            </div>
            <!-- 5. Yakisoba -->
            <div class="card-receita" onclick="window.location.href='yakisoba.html'">
                <img src="https://guiadoestudante.abril.com.br/wp-content/uploads/sites/4/2025/06/yakisoba.jpg?quality=70&strip=info&w=1280&h=720&crop=1" alt="Yakisoba">
                <h2>YAKISOBA</h2>
            </div>
            <!-- 6. Tempurá -->
            <div class="card-receita" onclick="window.location.href='tempura.html'">
                <img src="https://images.pexels.com/photos/1351238/pexels-photo-1351238.jpeg?auto=compress&cs=tinysrgb&w=600" alt="Tempurá">
                <h2>TEMPURÁ</h2>
            </div>
            <!-- 7. Guioza -->
            <div class="card-receita" onclick="window.location.href='guioza.html'">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT3isi-PEOHOriHXmFQxEkR8laH3DXxJwQR74jOLsZoDs1Nl-Siu7DqVK0&s" alt="Guioza">
                <h2>GUIOZA</h2>
            </div>
            <!-- 8. Donburi -->
            <div class="card-receita" onclick="window.location.href='donburi.html'">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSHil4jWuXbog3P1k8BTBZVIurVuE8NfECHotnIPlFmwL_91nywJTsXmSg3q3JoI8GoWbIVFsyBhMWJ2mSxIk-UrJ9t83laEgFmDJNBJUoLQQ&s=10" alt="Donburi">
                <h2>DONBURI</h2>
            </div>
            <!-- 9. Missoshiru -->
            <div class="card-receita" onclick="window.location.href='missoshiru.html'">
                <img src="https://www.receitasnestle.com.br/sites/default/files/srh_recipes/6dd1b82d4c7f237898c81e1717208206.jpg" alt="Missoshiru">
                <h2>MISSOSHIRU</h2>
            </div>
            <!-- 10. Takoyaki -->
            <div class="card-receita" onclick="window.location.href='takoyaki.html'">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTD3wke37LJU6X58SQsUjCBL5IYLNQwjE7ecQ79fC0LaLPhM-hIv4_AsIG9K8c1CS1qQ4Ovaeofj_jgQCv29T8UIFNpDuCFpX-Do7AFu6kuEg&s=10" alt="Takoyaki">
                <h2>TAKOYAKI</h2>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2025 COMIDA JAPONESA</p>
    </footer>

    <script>
        // Os redirecionamentos já estão nos onclick dos cards
        // Este script é apenas para garantir que o menu funcione
        const menuLinks = document.querySelectorAll('.menu a');
        menuLinks.forEach(link => {
            link.addEventListener('click', function(e) {
                // Não previne o comportamento padrão, apenas deixa o link funcionar
                // Se quiser simular, pode deixar como está
            });
        });
    </script>
</body>
</html>
